<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Book</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <canvas id="background-canvas"></canvas>
    <div class="app-shell">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <div>
                    <h1>Control Book</h1>
                    <p>Inventory management for products, sales and restock.</p>
                </div>
                <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                    <span style="color: #aaa; font-size: 14px;">👤 {{ user.username }}</span>
                    <a href="{{ url_for('logout') }}" style="color: #ff6b6b; text-decoration: none; padding: 8px 16px; border: 1px solid #ff6b6b; border-radius: 4px;">
                        Logout
                    </a>
                </div>
            </div>
        </header>

        <section class="card" id="product-form-card">
            <h2>Add Product</h2>
            <form id="product-form">
                <div class="field-row">
                    <label for="name">Name</label>
                    <input id="name" name="name" required />
                </div>
                <div class="field-row">
                    <label for="category">Category</label>
                    <input id="category" name="category" required />
                </div>
                <div class="field-row">
                    <label for="quantity">Quantity</label>
                    <input id="quantity" name="quantity" type="number" min="0" required />
                </div>
                <div class="field-row">
                    <label for="price">Price (KES)</label>
                    <input id="price" name="price" type="number" min="0" step="0.01" required />
                </div>
                <button type="submit">Add Product</button>
            </form>
        </section>

        <section class="card" id="products-card">
            <div class="section-header">
                <h2>Products</h2>
                <button id="refresh-button">Refresh</button>
            </div>
            <div id="message" class="message"></div>
            <table class="product-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                    <tr><td colspan="5">Loading products...</td></tr>
                </tbody>
            </table>
        </section>

        <section class="card sales-summary-card">
            <div class="section-header">
                <h2>Sales Summary</h2>
                <div class="button-row">
                    <button id="download-sales-button">Download Sold Items</button>
                    <button id="clear-history-button">Clear History</button>
                </div>
            </div>
            <div class="sales-metrics">
                <div class="metric">
                    <span class="metric-label">Total items sold</span>
                    <span class="metric-value" id="sales-count">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Total revenue</span>
                    <span class="metric-value" id="sales-total">KES 0.00</span>
                </div>
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
