<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Book</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <div class="app-shell">
        <header>
            <h1>Control Book</h1>
            <p>Inventory management for products, sales and restock.</p>
        </header>

        <section class="card" id="product-form-card">
            <h2>Add Product</h2>
            <form id="product-form">
                <div class="field-row">
                    <label for="name">Name</label>
                    <input id="name" name="name" required />
                </div>
                <div class="field-row">
                    <label for="category">Category</label>
                    <input id="category" name="category" required />
                </div>
                <div class="field-row">
                    <label for="quantity">Quantity</label>
                    <input id="quantity" name="quantity" type="number" min="0" required />
                </div>
                <div class="field-row">
                    <label for="price">Price (KES)</label>
                    <input id="price" name="price" type="number" min="0" step="0.01" required />
                </div>
                <button type="submit">Add Product</button>
            </form>
        </section>

        <section class="card sales-summary-card">
            <div class="section-header">
                <h2>Sales Summary</h2>
                <button id="clear-history-button">Clear History</button>
            </div>
            <div class="sales-metrics">
                <div class="metric">
                    <span class="metric-label">Total items sold</span>
                    <strong id="sales-count">0</strong>
                </div>
                <div class="metric">
                    <span class="metric-label">Total revenue</span>
                    <strong id="sales-total">KES 0.00</strong>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="section-header">
                <h2>Product Inventory</h2>
                <button id="refresh-button">Refresh</button>
            </div>
            <div id="message" class="message"></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body"></tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
